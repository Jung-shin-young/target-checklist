<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>CN8 전방카메라 실차 조치 현황</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 14px;
      padding-bottom: 92px;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      line-height: 1.4;
      color: #111;
      background: #fff;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 23px;
    }

    .box {
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 13px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .right {
      margin-left: auto;
    }

    button,
    input {
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      background: #fff;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .pill {
      border: 1px solid #ddd;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      background: #f7f7f7;
    }

    .versionBox {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #d6e4ff;
      border-radius: 12px;
      background: #f4f8ff;
      font-size: 14px;
    }

    .versionValue {
      font-weight: 800;
      color: #174ea6;
    }

    .tabs {
      margin-top: 11px;
    }

    .tabs button {
      border-radius: 999px;
    }

    .tabs button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .progressWrap {
      width: 100%;
      margin-top: 11px;
    }

    .progressBg {
      height: 12px;
      border: 1px solid #ddd;
      border-radius: 999px;
      overflow: hidden;
      background: #eee;
    }

    #pctBar {
      height: 100%;
      width: 0%;
      background: #2e7d32;
      transition: width 0.2s;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 13px;
      background: #fff;
    }

    .card.updateOnly {
      border-color: #e1b94f;
      background: #fffdf5;
    }

    .card.done {
      border-color: #86c896;
      background: #f5fff7;
    }

    .vin {
      font-size: 25px;
      font-weight: 800;
      word-break: break-all;
    }

    .state {
      margin-top: 4px;
      font-weight: 800;
    }

    .state.waiting {
      color: #666;
    }

    .state.update {
      color: #9a6700;
    }

    .state.done {
      color: #20752e;
    }

    .checkLine {
      margin-top: 8px;
      padding: 10px;
      border: 1px solid #e7e7e7;
      border-radius: 12px;
      background: #fafafa;
    }

    .checkTitle {
      font-weight: 800;
    }

    .memo {
      margin-top: 8px;
      padding: 9px;
      border-radius: 10px;
      background: #f2f2f2;
      white-space: pre-wrap;
    }

    .lastChange {
      margin-top: 9px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }

    .buttonRow {
      margin-top: 11px;
    }

    .updateButton.on {
      border-color: #d7a719;
      background: #fff4c2;
      font-weight: 800;
    }

    .dtcButton.on {
      border-color: #5b9b69;
      background: #dbf3df;
      font-weight: 800;
    }

    .dangerButton {
      color: #a32020;
    }

    .empty {
      padding: 30px 15px;
      text-align: center;
      color: #666;
      border: 1px dashed #ccc;
      border-radius: 14px;
    }

    .bottomBar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 999;
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 10px 12px;
    }

    .bottomInner {
      max-width: 980px;
      margin: auto;
      display: flex;
      gap: 8px;
    }

    .bottomInner button {
      flex: 1;
    }

    @media (max-width: 560px) {
      body {
        margin: 11px;
      }

      h2 {
        font-size: 21px;
      }

      #search {
        width: 100%;
      }

      .right {
        margin-left: 0;
      }

      .topButtons {
        width: 100%;
      }

      .topButtons button {
        flex: 1;
      }

      .buttonRow button {
        flex: 1 1 42%;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>

  <h2>CN8 전방카메라 실차 조치 현황</h2>

  <div class="box">

    <div class="row">
      <div>
        사용자:
        <b id="nickLabel">-</b>
      </div>

      <div class="right row topButtons">
        <button id="refreshBtn">새로고침</button>
        <button id="nickBtn">닉네임 변경</button>
        <button id="downloadBtn">엑셀</button>
      </div>
    </div>

    <div class="versionBox">
      적용 목표 버전:
      <span class="versionValue" id="versionLabel">미정</span>
    </div>

    <div class="row" style="margin-top:10px">
      <input
        id="search"
        placeholder="VIN 검색"
        autocomplete="off"
      >

      <span class="pill" id="cntTotal">
        총 -
      </span>

      <span class="pill" id="cntUpdate">
        업데이트 -
      </span>

      <span class="pill" id="cntDtc">
        VER/DTC -
      </span>

      <span class="pill" id="cntDone">
        최종완료 -
      </span>

      <span class="right muted" id="connection">
        연결 중...
      </span>
    </div>

    <div class="progressWrap">
      <div class="muted">
        최종 완료율:
        <b id="pctText">0%</b>
      </div>

      <div class="progressBg">
        <div id="pctBar"></div>
      </div>
    </div>

    <div class="row tabs" id="topTabs">
      <button data-tab="all" class="active">
        전체
      </button>

      <button data-tab="waiting">
        미완료
      </button>

      <button data-tab="update">
        업데이트 완료
      </button>

      <button data-tab="dtc">
        VER/DTC 완료
      </button>

      <button data-tab="done">
        최종 완료
      </button>
    </div>

    <div
      class="muted"
      id="saving"
      style="margin-top:8px"
    ></div>

  </div>

  <div id="list" class="list"></div>

  <div class="bottomBar">
    <div class="bottomInner">
      <button id="btnMine">내 작업</button>
      <button id="btnRecent">최근 변경</button>
    </div>
  </div>

<script>
  /* ===================================
     기본 설정
     목표 버전 확정 후 "미정"만 변경
     =================================== */

  const TARGET_VERSION = "미정";

  const SUPABASE_URL =
    "https://ulqpqkzgwitkxxnipjkx.supabase.co";

  const SUPABASE_KEY =
    "sb_publishable_LMSx0JifZNOQXN-ViIjNaA_fg3Vkedl";

  const TABLE_NAME =
    "checklist_cn8_front_camera";


  const $ = id =>
    document.getElementById(id);


  let items = [];

  let currentTab = "all";

  let specialView = null;

  let saving = false;

  let nickname =
    localStorage.getItem(
      "cn8_checklist_nickname"
    ) || "";


  function getHeaders(returnData = false) {
    const headers = {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json"
    };

    if (returnData) {
      headers["Prefer"] =
        "return=representation";
    }

    return headers;
  }


  function requireNickname() {
    while (!nickname) {
      const value = prompt(
        "닉네임을 입력하세요.\n예: 신영"
      );

      if (value && value.trim()) {
        nickname = value.trim();

        localStorage.setItem(
          "cn8_checklist_nickname",
          nickname
        );
      }
    }

    $("nickLabel").textContent =
      nickname;
  }


  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }


  function formatKST(value) {
    if (!value) return "-";

    return new Intl.DateTimeFormat(
      "ko-KR",
      {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }
    ).format(new Date(value));
  }


  function isUpdateDone(item) {
    return Boolean(item?.update_done);
  }


  function isDtcDone(item) {
    return Boolean(item?.dtc_done);
  }


  function isFinalDone(item) {
    return (
      isUpdateDone(item) &&
      isDtcDone(item)
    );
  }


  function derivedState(item) {
    if (isFinalDone(item)) {
      return "done";
    }

    if (isUpdateDone(item)) {
      return "update";
    }

    if (isDtcDone(item)) {
      return "dtc";
    }

    return "waiting";
  }


  function stateLabel(item) {
    const state = derivedState(item);

    if (state === "done") {
      return "최종 완료";
    }

    if (state === "update") {
      return "업데이트 완료 / VER·DTC 확인 대기";
    }

    if (state === "dtc") {
      return "VER·DTC 확인 완료 / 업데이트 미완료";
    }

    return "미완료";
  }


  function stateClass(item) {
    const state = derivedState(item);

    if (state === "done") {
      return "done";
    }

    if (
      state === "update" ||
      state === "dtc"
    ) {
      return "update";
    }

    return "waiting";
  }


  function cardClass(item) {
    if (isFinalDone(item)) {
      return "card done";
    }

    if (
      isUpdateDone(item) ||
      isDtcDone(item)
    ) {
      return "card updateOnly";
    }

    return "card";
  }


  function setSaving(value) {
    saving = value;

    $("saving").textContent =
      value ? "저장 중..." : "";

    document
      .querySelectorAll(
        "button,input"
      )
      .forEach(element => {
        if (element.id === "search") {
          return;
        }

        if (element.id === "nickBtn") {
          return;
        }

        element.disabled = value;
      });
  }


  async function loadData() {
    const url =
      `${SUPABASE_URL}/rest/v1/${TABLE_NAME}` +
      `?select=*&order=vin.asc`;

    $("connection").textContent =
      "연결 중...";

    try {
      const response =
        await fetch(
          url,
          {
            method: "GET",
            headers: getHeaders(false)
          }
        );

      const text =
        await response.text();

      if (!response.ok) {
        $("connection").textContent =
          `로드 실패 (${response.status})`;

        alert(
          "Supabase 로드 실패\n\n" +
          "상태코드: " +
          response.status +
          "\n내용: " +
          text
        );

        return;
      }

      items =
        text ? JSON.parse(text) : [];

      $("connection").textContent =
        `연결됨 ✅ (${items.length}대)`;

      render();

    } catch (error) {
      $("connection").textContent =
        "연결 오류";

      alert(
        "Supabase 연결 오류\n\n" +
        String(error)
      );
    }
  }


  async function patchRow(id, payload) {
    const url =
      `${SUPABASE_URL}/rest/v1/${TABLE_NAME}` +
      `?id=eq.${encodeURIComponent(id)}`;

    try {
      const response =
        await fetch(
          url,
          {
            method: "PATCH",
            headers: getHeaders(true),
            body: JSON.stringify(payload)
          }
        );

      if (!response.ok) {
        const text =
          await response.text();

        alert(
          "저장 실패\n\n" +
          "상태코드: " +
          response.status +
          "\n내용: " +
          text
        );

        return false;
      }

      return true;

    } catch (error) {
      alert(
        "저장 중 연결 오류\n\n" +
        String(error)
      );

      return false;
    }
  }


  function addLastChange(
    payload,
    now
  ) {
    payload.updated_by =
      nickname;

    payload.updated_at =
      now;
  }


  async function toggleUpdate(id) {
    requireNickname();

    const current =
      items.find(
        item => item.id === id
      );

    if (!current) return;

    const currentValue =
      isUpdateDone(current);

    const nextValue =
      !currentValue;

    if (
      isFinalDone(current) &&
      !nextValue
    ) {
      const confirmed =
        confirm(
          "이미 최종 완료된 차량입니다.\n\n" +
          "업데이트 완료를 해제하면 " +
          "VER/DTC 확인도 함께 해제되고 " +
          "최종 완료 상태가 취소됩니다.\n\n" +
          "정말 변경하시겠습니까?"
        );

      if (!confirmed) return;
    }

    setSaving(true);

    const now =
      new Date().toISOString();

    const payload = {
      update_done: nextValue,
      update_by:
        nextValue ? nickname : null,
      update_at:
        nextValue ? now : null
    };

    /*
      업데이트 완료를 해제할 경우
      DTC 완료도 함께 해제한다.
      업데이트 전 DTC 완료 상태 방지.
    */
    if (!nextValue) {
      payload.dtc_done = false;
      payload.dtc_by = null;
      payload.dtc_at = null;
    }

    addLastChange(
      payload,
      now
    );

    const success =
      await patchRow(
        id,
        payload
      );

    setSaving(false);

    if (success) {
      await loadData();
    }
  }


  async function toggleDtc(id) {
    requireNickname();

    const current =
      items.find(
        item => item.id === id
      );

    if (!current) return;

    const currentValue =
      isDtcDone(current);

    const nextValue =
      !currentValue;

    /*
      DTC 완료는 업데이트 완료 후에만 가능
    */
    if (
      nextValue &&
      !isUpdateDone(current)
    ) {
      alert(
        "먼저 업데이트 완료를 처리해주세요.\n\n" +
        "VER/DTC 확인은 업데이트 완료 후에만 가능합니다."
      );

      return;
    }

    if (
      isFinalDone(current) &&
      !nextValue
    ) {
      const confirmed =
        confirm(
          "이미 최종 완료된 차량입니다.\n\n" +
          "VER/DTC 확인 완료를 해제하면 " +
          "최종 완료 상태가 취소됩니다.\n\n" +
          "정말 변경하시겠습니까?"
        );

      if (!confirmed) return;
    }

    setSaving(true);

    const now =
      new Date().toISOString();

    const payload = {
      dtc_done: nextValue,
      dtc_by:
        nextValue ? nickname : null,
      dtc_at:
        nextValue ? now : null
    };

    addLastChange(
      payload,
      now
    );

    const success =
      await patchRow(
        id,
        payload
      );

    setSaving(false);

    if (success) {
      await loadData();
    }
  }


  async function resetIncomplete(id) {
    requireNickname();

    const current =
      items.find(
        item => item.id === id
      );

    if (!current) return;

    if (
      !isUpdateDone(current) &&
      !isDtcDone(current)
    ) {
      alert(
        "이미 미완료 상태입니다."
      );

      return;
    }

    const message =
      isFinalDone(current)
        ? (
          "이미 최종 완료된 차량입니다.\n\n" +
          "업데이트 완료와 VER/DTC 확인을 " +
          "모두 해제하고 미완료로 변경하시겠습니까?"
        )
        : (
          "현재 작업 기록을 해제하고 " +
          "미완료로 변경하시겠습니까?"
        );

    const confirmed =
      confirm(message);

    if (!confirmed) return;

    setSaving(true);

    const now =
      new Date().toISOString();

    const payload = {
      update_done: false,
      update_by: null,
      update_at: null,

      dtc_done: false,
      dtc_by: null,
      dtc_at: null
    };

    addLastChange(
      payload,
      now
    );

    const success =
      await patchRow(
        id,
        payload
      );

    setSaving(false);

    if (success) {
      await loadData();
    }
  }


  async function editComment(id) {
    requireNickname();

    const current =
      items.find(
        item => item.id === id
      );

    if (!current) return;

    if (isFinalDone(current)) {
      const confirmed =
        confirm(
          "최종 완료된 차량입니다.\n\n" +
          "최종 완료 상태는 유지되지만 " +
          "코멘트와 최근 변경자 기록이 바뀝니다.\n\n" +
          "코멘트를 수정하시겠습니까?"
        );

      if (!confirmed) return;
    }

    const value =
      prompt(
        "기타 코멘트를 입력하세요.\n" +
        "빈칸으로 저장하면 기존 코멘트가 삭제됩니다.",
        current.memo || ""
      );

    if (value === null) return;

    setSaving(true);

    const now =
      new Date().toISOString();

    const payload = {
      memo: value.trim() || null
    };

    addLastChange(
      payload,
      now
    );

    const success =
      await patchRow(
        id,
        payload
      );

    setSaving(false);

    if (success) {
      await loadData();
    }
  }


  function filterItems() {
    const query =
      $("search")
        .value
        .trim()
        .toUpperCase();

    let view =
      [...items];

    if (query) {
      view =
        view.filter(item =>
          String(item.vin || "")
            .toUpperCase()
            .includes(query)
        );
    }

    if (specialView === "mine") {
      view =
        view.filter(item =>
          item.updated_by === nickname ||
          item.update_by === nickname ||
          item.dtc_by === nickname
        );
    }

    if (specialView === "recent") {
      const limit =
        Date.now() -
        24 * 60 * 60 * 1000;

      view =
        view.filter(item =>
          item.updated_at &&
          new Date(
            item.updated_at
          ).getTime() >= limit
        );
    }

    if (!specialView) {
      if (currentTab === "waiting") {
        view =
          view.filter(item =>
            !isUpdateDone(item) &&
            !isDtcDone(item)
          );
      }

      if (currentTab === "update") {
        view =
          view.filter(item =>
            isUpdateDone(item)
          );
      }

      if (currentTab === "dtc") {
        view =
          view.filter(item =>
            isDtcDone(item)
          );
      }

      if (currentTab === "done") {
        view =
          view.filter(item =>
            isFinalDone(item)
          );
      }
    }

    /*
      미완료 → 업데이트만 완료 →
      최종완료 순으로 정렬
    */
    const order = {
      waiting: 1,
      update: 2,
      dtc: 3,
      done: 4
    };

    view.sort((a, b) => {
      if (specialView) {
        const timeA =
          new Date(
            a.updated_at || 0
          ).getTime();

        const timeB =
          new Date(
            b.updated_at || 0
          ).getTime();

        return timeB - timeA;
      }

      const stateDiff =
        order[derivedState(a)] -
        order[derivedState(b)];

      if (stateDiff !== 0) {
        return stateDiff;
      }

      return String(a.vin)
        .localeCompare(
          String(b.vin)
        );
    });

    return view;
  }


  function makeCard(item) {
    const card =
      document.createElement("div");

    card.className =
      cardClass(item);

    const updateMark =
      isUpdateDone(item)
        ? "✅"
        : "⬜";

    const dtcMark =
      isDtcDone(item)
        ? "✅"
        : "⬜";

    const finalMark =
      isFinalDone(item)
        ? "✅"
        : "⬜";

    const updateButtonText =
      isUpdateDone(item)
        ? "업데이트 완료 해제"
        : "업데이트 완료";

    const dtcButtonText =
      isDtcDone(item)
        ? "VER/DTC 완료 해제"
        : "VER/DTC 완료";

    card.innerHTML = `
      <div class="vin">
        ${escapeHtml(item.vin)}
      </div>

      <div class="state ${stateClass(item)}">
        ${finalMark}
        ${stateLabel(item)}
      </div>

      <div class="checkLine">
        <div class="checkTitle">
          ${updateMark}
          업데이트 완료
        </div>

        <div class="muted">
          작업자:
          ${escapeHtml(item.update_by || "-")}
        </div>

        <div class="muted">
          시간:
          ${formatKST(item.update_at)}
        </div>
      </div>

      <div class="checkLine">
        <div class="checkTitle">
          ${dtcMark}
          VER / DTC 확인 완료
        </div>

        <div class="muted">
          작업자:
          ${escapeHtml(item.dtc_by || "-")}
        </div>

        <div class="muted">
          시간:
          ${formatKST(item.dtc_at)}
        </div>
      </div>

      ${
        item.memo
          ? `
            <div class="memo">
              <b>기타 코멘트</b><br>
              ${escapeHtml(item.memo)}
            </div>
          `
          : `
            <div class="muted" style="margin-top:8px">
              기타 코멘트: -
            </div>
          `
      }

      <div class="lastChange muted">
        최근 변경:
        <b>${escapeHtml(item.updated_by || "-")}</b>
        ·
        ${formatKST(item.updated_at)}
      </div>

      <div class="row buttonRow">
        <button
          class="updateButton ${isUpdateDone(item) ? "on" : ""}"
          onclick="toggleUpdate('${item.id}')"
        >
          ${updateButtonText}
        </button>

        <button
          class="dtcButton ${isDtcDone(item) ? "on" : ""}"
          onclick="toggleDtc('${item.id}')"
        >
          ${dtcButtonText}
        </button>

        <button
          onclick="editComment('${item.id}')"
        >
          기타 코멘트
        </button>

        <button
          class="dangerButton"
          onclick="resetIncomplete('${item.id}')"
        >
          미완료로 변경
        </button>
      </div>
    `;

    return card;
  }


  function renderList(view) {
    const container =
      $("list");

    container.innerHTML = "";

    if (view.length === 0) {
      container.innerHTML = `
        <div class="empty">
          표시할 VIN이 없습니다.
        </div>
      `;

      return;
    }

    const batchSize = 50;

    let index = 0;

    function drawBatch() {
      const fragment =
        document.createDocumentFragment();

      const end =
        Math.min(
          index + batchSize,
          view.length
        );

      for (
        ;
        index < end;
        index++
      ) {
        fragment.appendChild(
          makeCard(view[index])
        );
      }

      container.appendChild(
        fragment
      );

      if (index < view.length) {
        requestAnimationFrame(
          drawBatch
        );
      }
    }

    drawBatch();
  }


  function updateSummary() {
    const total =
      items.length;

    const updateCount =
      items.filter(
        isUpdateDone
      ).length;

    const dtcCount =
      items.filter(
        isDtcDone
      ).length;

    const finalCount =
      items.filter(
        isFinalDone
      ).length;

    $("cntTotal").textContent =
      `총 ${total}`;

    $("cntUpdate").textContent =
      `업데이트 ${updateCount}`;

    $("cntDtc").textContent =
      `VER/DTC ${dtcCount}`;

    $("cntDone").textContent =
      `최종완료 ${finalCount}`;

    const percentage =
      total
        ? Math.round(
            finalCount /
            total *
            100
          )
        : 0;

    $("pctText").textContent =
      `${percentage}%`;

    $("pctBar").style.width =
      `${percentage}%`;
  }


  function updateTabAppearance() {
    document
      .querySelectorAll(
        "#topTabs button"
      )
      .forEach(button => {
        button.classList.toggle(
          "active",
          !specialView &&
          button.dataset.tab ===
          currentTab
        );
      });
  }


  function render() {
    updateSummary();

    updateTabAppearance();

    const view =
      filterItems();

    renderList(view);
  }


  $("search").addEventListener(
    "input",
    render
  );


  $("refreshBtn").onclick =
    loadData;


  $("nickBtn").onclick = () => {
    nickname = "";

    localStorage.removeItem(
      "cn8_checklist_nickname"
    );

    requireNickname();

    specialView = null;

    render();
  };


  document
    .querySelectorAll(
      "#topTabs button"
    )
    .forEach(button => {
      button.onclick = () => {
        currentTab =
          button.dataset.tab;

        specialView = null;

        render();
      };
    });


  $("btnMine").onclick = () => {
    requireNickname();

    specialView =
      specialView === "mine"
        ? null
        : "mine";

    render();
  };


  $("btnRecent").onclick = () => {
    specialView =
      specialView === "recent"
        ? null
        : "recent";

    render();
  };


  $("downloadBtn").onclick = () => {
    if (
      typeof XLSX === "undefined"
    ) {
      alert(
        "엑셀 기능을 불러오지 못했습니다."
      );

      return;
    }

    const rows =
      items.map(item => ({
        VIN:
          item.vin,

        목표버전:
          TARGET_VERSION,

        최종상태:
          stateLabel(item),

        업데이트완료:
          isUpdateDone(item)
            ? "Y"
            : "N",

        업데이트작업자:
          item.update_by || "",

        업데이트시간:
          formatKST(item.update_at),

        VER_DTC완료:
          isDtcDone(item)
            ? "Y"
            : "N",

        VER_DTC작업자:
          item.dtc_by || "",

        VER_DTC시간:
          formatKST(item.dtc_at),

        최종완료:
          isFinalDone(item)
            ? "Y"
            : "N",

        기타코멘트:
          item.memo || "",

        최근변경자:
          item.updated_by || "",

        최근변경시간:
          formatKST(item.updated_at)
      }));

    const worksheet =
      XLSX.utils.json_to_sheet(
        rows
      );

    worksheet["!cols"] = [
      { wch: 20 },
      { wch: 18 },
      { wch: 30 },
      { wch: 14 },
      { wch: 14 },
      { wch: 23 },
      { wch: 14 },
      { wch: 14 },
      { wch: 23 },
      { wch: 12 },
      { wch: 35 },
      { wch: 14 },
      { wch: 23 }
    ];

    const workbook =
      XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
      workbook,
      worksheet,
      "CN8 Checklist"
    );

    const stamp =
      new Date()
        .toISOString()
        .slice(0, 19)
        .replaceAll(":", "-");

    XLSX.writeFile(
      workbook,
      `cn8_front_camera_${stamp}.xlsx`
    );
  };


  document.addEventListener(
    "DOMContentLoaded",
    () => {
      $("versionLabel").textContent =
        TARGET_VERSION;

      requireNickname();

      loadData();
    }
  );
</script>

</body>
</html>
